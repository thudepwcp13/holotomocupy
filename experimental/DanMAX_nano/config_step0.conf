# DanMAX nano near-field ptychography (step 0)
#
# Input HDF5 files. The detector data are read from /entry/measurement/orca.
dark_file=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/raw_data/scan-0076.h5
flat_file=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/raw_data/scan-0097.h5
sample_file=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/raw_data/scan-0096.h5

# Output from step 0. This file can be used later as an initial probe source.
h5_out=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/output/DanMAX_nano_nfp_results.h5
path_out=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/output/DanMAX_nano_step0

# HDF5 dataset paths used by the DanMAX acquisition layout.
detector_path=/entry/measurement/orca
x_path=/entry/measurement/tom_sam_x
y_path=/entry/measurement/tom_y

# Geometry. DanMAX files may not always carry all reconstruction-ready values,
# so keep them explicit and edit these before a production run.
energy=19.55                  # keV
z1=0.12669                     # focus-to-sample distance [m]
focustodetectordistance=1.55669 # focus-to-detector distance [m]
detector_pixelsize=5.5e-7    # detector pixel size [m]

# Coordinate handling for tom_sam_x / tom_y.
# Supported units: m, mm, um, nm, px. Use px if the recorded positions are already object-plane pixels.
position_unit=mm
pos_row_sign=-1.0            # row/vertical pixel shift from tom_y
pos_col_sign=1.0             # column/horizontal pixel shift from tom_sam_x
center_positions=true        # subtract mean position before converting to pixels

# Reconstruction square size.
# If n is smaller than both detector dimensions, the code uses a centered n x n crop.
# If n equals the long detector dimension, the short detector dimension is padded symmetrically.
# For a 2592 x 3712 DanMAX frame, n=3712 keeps the full image width and pads the height.
# Set n=0 to use n=max(ny, nx), i.e. full field of view with padding to a square.
n=3712

# NFP optimizer settings.
niter=5
nchunk=4
vis_step=1
err_step=1
rho=1,2,0.1

# Sanity-check options.
# Set run_reconstruction=false to only validate files, frame shapes, flat/dark correction, positions, and write h5_out.
run_reconstruction=false
write_corrected_preview=true
preview_count=16
log_level=INFO

flat_correct=false
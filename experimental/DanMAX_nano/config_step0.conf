# DanMAX nano near-field ptychography (step 0)
#
# Input HDF5 files. The detector data are read from /entry/measurement/orca.
dark_file=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/raw_data/scan-0076.h5
flat_file=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/raw_data/scan-0097.h5
sample_file=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/raw_data/scan-0096.h5

# Output from step 0. This file can be used later as an initial probe source.
h5_out=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/output/DanMAX_nano_nfp_results.h5
path_out=/dtu/3d-imaging-center/projects/2022_DANFIX_BioToBank/raw_data_extern/XHIST/output/DanMAX_nano_step0

# HDF5 dataset paths used by the DanMAX acquisition layout.
detector_path=/entry/measurement/orca
x_path=/entry/measurement/tom_sam_x
y_path=/entry/measurement/tom_y

# Geometry.
energy=19.55
z1=0.12669
focustodetectordistance=1.55669
detector_pixelsize=5.5e-7

# Coordinate handling for tom_sam_x / tom_y.
position_unit=mm
pos_row_sign=-1.0
pos_col_sign=1.0
center_positions=true

# Reconstruction square size.
# n=3712 keeps the full 3712-pixel detector width and pads the 2592-pixel
# height symmetrically. n=0 automatically uses max(ny,nx).
n=3712

# When true, only pixels originating from the real detector contribute to the
# NFP loss, gradient, and Hessian. For 2592x3712 -> 3712x3712 this masks the
# upper and lower 560 padded rows while preserving the complete detector width.
use_valid_detector_mask=true

# NFP optimizer settings.
niter=5
nchunk=4
vis_step=1
err_step=1
rho=1,2,0.1

# Sanity-check options.
run_reconstruction=false
write_corrected_preview=true
preview_count=16
write_position_bbox_plot=true
position_bbox_grid_size=5
log_level=INFO

# false: dark-subtracted raw sample + global mean normalization.
# true:  (sample-dark)/(flat-dark) + global mean normalization.
flat_correct=false

path_out=/data3/vnikitin/brain/20251115/Y350a_new_rec         # output directory
pfile=Y350a_HT_20nm_8dist                                    # scan prefix; input is path_out/pfile.h5
prb_file=nfp_results.h5                                      # NFP probe initial guess (relative to path_out)
init_vol=/data3/vnikitin/brain/20251115/Y350a/Y350a_HT_20nm_8dist_rec1234_/Y350a_HT_20nm_8dist_rec_cm_.vol # initial object from external .vol file
init_vol_scale=200    # scale factor applied to .vol values on load

nchunk=16             # projections per GPU batch
ntheta=4000           # number of projection angles
start_theta=0         # index of first projection angle
ndist=4               # number of distances

niter=513             # number of iterations
start_iter=0          # resume from this iteration (0 = start fresh)
checkpoint_step=8     # save checkpoint every N iters (-1 = disabled)
error_step=8          # print error every N iters

nz=1024               # vertical detector size (pixels)
n=1024                # horizontal detector size (pixels)
nzobj=1024            # vertical object size (pixels)
nobj=1608             # horizontal object size in x and y (pixels)
bin=1                 # binning level (0 = full resolution)

rotation_center_shift=-8.780113  # rotation axis offset from detector centre (pixels)
paganin=20            # delta/beta ratio for Paganin phase retrieval
obj_dtype=complex64   # object array dtype: float32 or complex64
mask=1.1              # circular mask radius as fraction of n (-1 = no mask)

lam_prbfit=3.1e-3     # probe fit regularisation weight
lam_laplacian=0       # 3-D Laplacian regularisation weight
rho=1,0.05,0.02       # gradient step scales: object, probe, positions

log_level=INFO

path_out=/data3/vnikitin/atomium/20240924/AtomiumS2_new_rec  # output directory
pfile=AtomiumS2_HT_007nm                                     # scan prefix; input is path_out/pfile.h5
#init_vol=                                                   # initial object from external .vol file (absolute path)

nchunk=2              # projections per GPU batch
ntheta=1800           # number of projection angles
start_theta=0         # index of first projection angle
ndist=4               # number of distances

niter=2048            # number of iterations
start_iter=0          # resume from this iteration (0 = start fresh)
checkpoint_step=32    # save checkpoint every N iters (-1 = disabled)
error_step=32         # print error every N iters

nz=2048               # vertical detector size (pixels)
n=2048                # horizontal detector size (pixels)
nzobj=3264            # vertical object size (pixels)
nobj=3264             # horizontal object size in x and y (pixels)
bin=0                 # binning level (0 = full resolution)

rotation_center_shift=-27.00227  # rotation axis offset from detector centre (pixels)
paganin=120           # delta/beta ratio for Paganin phase retrieval
obj_dtype=complex64   # object array dtype: float32 or complex64
mask=1.1              # circular mask radius as fraction of n (-1 = no mask)

lam_prbfit=3.1e-3     # probe fit regularisation weight
lam_laplacian=0       # 3-D Laplacian regularisation weight
rho=1,0.05,0.02       # gradient step scales: object, probe, positions

log_level=WARNING

path_out=/gpfs/jazzy/data/visitor/ls3231/id16a/20250604/Y350a_FT_large_rand_disp_rec  # output directory
pfile=Y350a_FT_large_rand_disp_nobin_020nm                   # scan prefix; input is path_out/pfile.h5
# prb_file=nfp_results.h5                                   # NFP probe initial guess (relative to path_out)
#init_vol=                                                   # initial object from external .vol file (absolute path)

nchunk=16             # projections per GPU batch
ntheta=4000           # number of projection angles
start_theta=0         # index of first projection angle
ndist=1               # number of distances

niter=513             # number of iterations
start_iter=0          # resume from this iteration (0 = start fresh)
checkpoint_step=64    # save checkpoint every N iters (-1 = disabled)
error_step=64         # print error every N iters

nz=1024               # vertical detector size (pixels)
n=1024                # horizontal detector size (pixels)
nzobj=1024            # vertical object size (pixels)
nobj=1024             # horizontal object size in x and y (pixels)
bin=2                 # binning level (0 = full resolution)

rotation_center_shift=-11.79  # rotation axis offset from detector centre (pixels)
paganin=100           # delta/beta ratio for Paganin phase retrieval
obj_dtype=complex64   # object array dtype: float32 or complex64
mask=-1               # circular mask radius as fraction of n (-1 = no mask)

lam_prbfit=3.1e-3     # probe fit regularisation weight
lam_laplacian=0       # 3-D Laplacian regularisation weight
rho=1,0.05,0.02       # gradient step scales: object, probe, positions

log_level=INFO

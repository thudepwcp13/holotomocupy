# ID16B near-field ptychography input layout.
# Normal ASCII quotes are optional; key templates may use ${n} or {n}.

dark_file=/path/to/ID16B_dark.h5
dark_key=/3.1/measurement/pco1
dark_nframes=51

flat_file=/path/to/ID16B_flat.h5
flat_key=/${n}.1/measurement/pco1
flat_scan_ids=1:10

sample_file=/path/to/ID16B_sample.h5
sample_key=/${n}.1/measurement/pco1
sample_scan_ids=1:256
motor_x_key=/${n}.1/instrument/positioners/sy
motor_y_key=/${n}.1/instrument/positioners/sz

# Optional subset using the actual sample scan IDs.
# Examples: frame_ids=1,5,10 or frame_ids=1:256:4
frame_ids=all

h5_out=./output_step0/ID16B_nfp_results.h5
path_out=./output_step0

energy=29.63
z1=0.059599
focustodetectordistance=0.704433
detector_pixelsize=6.5e-7

position_unit=mm
pos_row_sign=-1.0
pos_col_sign=1.0
center_positions=true

# ID16B images are already square; no crop or padding is performed.
n=2048

niter=10
nchunk=4
vis_step=1
err_step=1
rho=1,2,0.00001

flat_correct=false
run_reconstruction=false
write_corrected_preview=true
preview_count=8
write_position_bbox_plot=true
position_bbox_grid_size=5
log_level=INFO

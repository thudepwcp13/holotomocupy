path_out=/eagle/APS_IRI/vnikitin/20231007/y350a_80um_rec  # output directory
pfile=y350a_80um_4k_08nm                                  # scan prefix; input is path_out/pfile.h5
prb_file=nfp_results.h5                                   # NFP probe initial guess (relative to path_out)
#init_vol=                                                # initial object from external .vol file (absolute path)

nchunk=4              # projections per GPU batch
ntheta=4000           # number of projection angles
start_theta=0         # index of first projection angle
ndist=4               # number of distances

niter=513             # number of iterations
start_iter=0          # resume from this iteration (0 = start fresh)
checkpoint_step=32    # save checkpoint every N iters (-1 = disabled)
error_step=32         # print error every N iters

nz=1536               # vertical detector size (pixels)
n=1536                # horizontal detector size (pixels)
nzobj=2500            # vertical object size (pixels)
nobj=2500             # horizontal object size in x and y (pixels)
bin=2                 # binning level (0 = full resolution, should correspond to log2(detector_size/n) if no cropping)

rotation_center_shift=35.66  # rotation axis offset from detector centre (pixels)
paganin=27            # delta/beta ratio for Paganin phase retrieval
obj_dtype=complex64   # object array dtype: float32 or complex64
mask=-1               # circular mask radius as fraction of n (-1 = no mask)

lam_prbfit=3.1e-3     # probe fit regularisation weight
lam_laplacian=0       # 3-D Laplacian regularisation weight
rho=1,0.05,0.02       # gradient step scales: object, probe, positions

log_level=INFO
